name: harness

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST — 라이브 배포 + 컴플라이언스 자동 점검
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run harness (source + live)
        run: python harness/check.py
