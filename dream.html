/* ── 드림시뮬레이션 · ARBITORIA (deep forest + gold) ── */
:root{
  --bg:#0B1F17; --surface:#122A20; --surface-2:#1A3A2C; --card-line:rgba(255,255,255,.08);
  --ink:#F2EEE3; --ink-2:#BFCDC0; --ink-3:#7E9284;
  --gold:#C9A961; --gold-2:#E4C77B; --gold-soft:rgba(201,169,97,.14);
  --emerald:#3FA37C; --emerald-soft:rgba(63,163,124,.16);
  --terra:#D08B6A; --terra-soft:rgba(208,139,106,.14);
  --line:rgba(201,169,97,.22);
  --shadow:0 2px 6px rgba(0,0,0,.25), 0 16px 40px rgba(0,0,0,.35);
  --radius:14px;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:radial-gradient(1200px 700px at 50% -10%, #123024 0%, var(--bg) 55%);
  color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* 상단 브랜드 */
.topbar{position:sticky;top:0;z-index:50;background:rgba(11,31,23,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--card-line)}
.topbar-inner{max-width:980px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand-btn{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:-.01em;color:var(--ink);background:transparent;border:0;text-align:left;transition:opacity .2s ease;cursor:pointer}
.brand-btn:hover{opacity:.7}
.topbar-link{color:var(--gold);font-weight:700;font-size:13.5px;text-decoration:none;padding:7px 14px;border:1.5px solid var(--line);border-radius:99px;background:var(--surface-2);transition:all .15s ease;white-space:nowrap}
.topbar-link:hover{border-color:var(--gold);color:var(--gold-2)}
.brand-mark{width:26px;height:26px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#0B1F17;font-size:13px;font-weight:800}
.brand-sub{color:var(--ink-3);font-weight:500;font-size:13.5px}
.brand-sub::before{content:'·';margin:0 8px;color:var(--ink-3)}

.nebula{display:none}
.progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:60}
.progress span{display:block;height:100%;width:0;background:var(--gold);transition:width .5s ease;box-shadow:0 0 8px rgba(201,169,97,.6)}

#stage{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:44px clamp(20px,5vw,32px) 80px}
.screen{animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screen.center{min-height:72vh;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:22px}
.screen[hidden]{display:none!important}  /* POSTMORTEM 규칙 */
[hidden]{display:none!important}         /* 전역 방어: 어떤 display 규칙도 hidden을 이기지 못하게 */

.glass{background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);box-shadow:var(--shadow)}
.dreamy{font-weight:800;letter-spacing:-.025em;line-height:1.18;color:var(--ink)}
.dreamy em{font-style:normal;color:var(--gold)}
.eyebrow{display:inline-block;background:var(--gold-soft);color:var(--gold);padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.muted{color:var(--ink-2)}.faint{color:var(--ink-3)}

.hero{text-align:center;padding:clamp(34px,6vw,56px);max-width:640px}
.hero h1,.hero h2{font-size:clamp(30px,5.5vw,46px);margin:18px 0 14px}
.lang-sub{color:var(--ink-2);font-size:15px;margin-bottom:24px}
.panel{text-align:center;padding:clamp(28px,5vw,44px);max-width:600px;width:100%}
.panel h2{font-size:clamp(24px,4.5vw,32px);margin-bottom:22px}

.btn{font-size:14.5px;font-weight:700;padding:12px 22px;border-radius:10px;border:1px solid transparent;transition:all .15s ease;white-space:nowrap;color:var(--ink-2)}
.btn:hover{color:var(--ink);background:var(--surface-2)}
.btn.glow{background:var(--gold);color:#0B1F17}
.btn.glow:hover{background:var(--gold-2);color:#0B1F17}
.btn.ghost{border-color:var(--card-line);background:var(--surface)}
.btn.ghost:hover{border-color:var(--ink-3)}
.row{display:flex;align-items:center}.wrap{flex-wrap:wrap}.gap{gap:10px}.center{justify-content:center}
#langRow{justify-content:center}
.start-btn{display:block;margin:28px auto 0;padding:13px 28px;font-size:15px}
.lang-btn{min-width:112px;border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink)}
.lang-btn:hover{border-color:var(--gold);background:var(--surface-2);color:var(--ink)}
.lang-btn.glow{background:var(--gold);border-color:var(--gold);color:#0B1F17}
.lang-btn.glow:hover{background:var(--gold-2);color:#0B1F17}

.s-nav{display:flex;justify-content:space-between;gap:12px;margin-top:36px}
.s-nav.center{justify-content:center}
.s-head{text-align:center;margin-bottom:24px}
.step-no{display:inline-block;background:var(--gold-soft);color:var(--gold);padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.s-head h2{font-size:clamp(23px,4.5vw,32px);font-weight:800;letter-spacing:-.02em}
.s-sub{color:var(--ink-3);font-size:13.5px;margin-top:8px;text-align:center}

/* 성별 */
.choice-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.choice{color:var(--ink);background:var(--surface-2);border:1px solid var(--card-line);border-radius:var(--radius);padding:20px 26px;min-width:112px;transition:all .18s ease;display:flex;flex-direction:column;align-items:center;gap:8px}
.choice .ce{font-size:2.2rem}
.choice:hover{transform:translateY(-2px);border-color:var(--ink-3)}
.choice.on{background:var(--gold-soft);border-color:var(--gold)}

/* 슬라이더 공통 */
.big-num{font-weight:800;font-size:clamp(52px,13vw,80px);letter-spacing:-.03em;color:var(--gold-2);line-height:1;display:block;margin:6px 0 14px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;max-width:460px;height:5px;border-radius:99px;background:rgba(255,255,255,.14);outline:none;margin:6px auto}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;background:var(--gold);border:3px solid var(--bg);box-shadow:0 0 0 1.5px var(--gold)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;cursor:pointer;background:var(--gold);border:3px solid var(--bg);box-shadow:0 0 0 1.5px var(--gold)}

/* 현실 입력 */
.sit{display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto}
.sit .glass{padding:20px}
.field{display:block;margin-bottom:16px}.field:last-child{margin-bottom:0}
.ft{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-size:14px;color:var(--ink-2);font-weight:600}
.ft output{color:var(--gold-2);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.seg button{color:var(--ink-2);background:var(--surface-2);border:1px solid transparent;border-radius:10px;padding:10px 4px;font-size:13.5px;font-weight:600;transition:all .15s ease}
.seg button.on{color:var(--ink);background:var(--gold-soft);border-color:var(--gold)}
.seg.four{grid-template-columns:repeat(4,1fr)}
@media(max-width:560px){.seg.four{grid-template-columns:repeat(2,1fr)}}
.mort-note{font-size:12.5px;color:var(--ink-3);margin-top:6px}
.mort-note b{color:var(--gold)}

/* 진단 */
.diag{display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto}
.diag .glass{padding:22px}
.flow-bar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:14px 0 10px}
.flow-bar i{display:block;height:100%;transition:width .35s cubic-bezier(.2,.7,.2,1)}
.flow-bar.slim{height:18px;margin:10px 0 8px}
.flow-bar.warn{box-shadow:0 0 0 1.5px #E05B4B}
.flow-bar i.overflow{animation:pulseOver 1.2s ease-in-out infinite}
@keyframes pulseOver{0%,100%{opacity:1}50%{opacity:.55}}

/* 현실 화면 실시간 흐름 */
.sit-live{position:sticky;top:62px;z-index:10;padding:14px 18px}
.sl-head{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px}
.sl-head b{color:var(--gold-2);font-size:15px}
.sl-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-3)}
.sl-item{display:inline-flex;align-items:center;gap:5px}
.sl-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.sit-verdict{margin-top:8px;font-size:13px;font-weight:700}
.sit-verdict.ok{color:var(--emerald)}
.sit-verdict.ok b{color:var(--emerald)}
.sit-verdict.over{color:#E05B4B}
.sit-verdict.over b{color:#E05B4B}
.flow-legend{display:flex;flex-direction:column;gap:7px}
.fl-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
.fl-dot{width:11px;height:11px;border-radius:4px;flex-shrink:0}
.fl-name{flex:1;color:var(--ink-2)}
.fl-pct{font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.fl-amt{color:var(--ink-3);font-size:12.5px;min-width:74px;text-align:right;font-variant-numeric:tabular-nums}
.saverate-big{font-size:clamp(38px,9vw,54px);font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--emerald)}
.saverate-big.warn{color:var(--terra)}
.diag-verdict{font-size:14.5px;color:var(--ink-2);margin-top:8px;line-height:1.6}
.diag-verdict b{color:var(--gold)}
.hidden-save{margin-top:12px;padding:14px 16px;background:var(--emerald-soft);border-radius:10px;font-size:13px;color:var(--ink-2);text-align:left}
.hidden-save b{color:var(--emerald)}
.hs-title{font-weight:800;color:var(--ink);font-size:13.5px;margin-bottom:10px;text-align:center}
.hs-bar{display:flex;height:16px;border-radius:8px;overflow:hidden;margin-bottom:10px}
.hs-bar i{display:block;height:100%;transition:width .4s ease}
.hs-bar .hs-int{background:var(--terra)}
.hs-bar .hs-pr{background:var(--emerald)}
.hs-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;line-height:1.5}
.hs-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:5px}
.hs-dot.int{background:var(--terra)}
.hs-dot.pr{background:var(--emerald)}
.hs-note{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.12);color:var(--ink-3);font-size:12.5px;text-align:center}

/* 카드 그리드 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.card{color:var(--ink);background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);padding:20px 14px 16px;text-align:center;transition:all .18s ease;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-2px);border-color:var(--ink-3)}
.card .ce{font-size:2.6rem;display:block;line-height:1;margin-bottom:10px}
.card .nm{font-weight:700;font-size:14.5px;display:block;letter-spacing:-.01em}
.card .pr{color:var(--ink-3);font-size:12.5px;margin-top:3px;display:block}
.card.on{background:var(--gold-soft);border-color:var(--gold)}
.card.on .pr{color:var(--gold)}

/* 계산 */
.calc{display:flex;flex-direction:column;gap:14px}
.dream-summary{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;padding:14px 18px;font-size:14.5px;font-weight:600}
.dream-summary .ds{display:flex;align-items:center;gap:7px}
.dream-summary .ds .e{font-size:1.4rem}
.total-card{text-align:center;padding:22px}
.total-card .muted{font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--ink-3)}
.total-num{font-weight:800;font-size:clamp(32px,7vw,44px);color:var(--gold-2);letter-spacing:-.02em;line-height:1.1;display:block;margin-top:2px}
.two-path{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;text-align:left}
@media(max-width:640px){.two-path{grid-template-columns:1fr}}
.path-col{border:1px solid var(--card-line);border-radius:12px;padding:14px 16px;background:var(--surface-2)}
.path-col .pc-t{font-size:11.5px;font-weight:700;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.path-col .pc-v{font-size:21px;font-weight:800;letter-spacing:-.01em;color:var(--ink-2);text-decoration:line-through;text-decoration-color:var(--terra);text-decoration-thickness:2px}
.path-col .pc-n{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.5}
.path-col.hero{background:var(--gold-soft);border-color:var(--gold)}
.path-col.hero .pc-t{color:var(--gold)}
.path-col.hero .pc-v{color:var(--gold-2);text-decoration:none;font-size:25px}
.path-col.hero .pc-n{color:var(--ink-2)}
/* 종자돈 3박자 공개 애니메이션: 월 → ×12 → ÷4% → 🌳 */
.seed-steps{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}
.seed-steps .ss{background:var(--surface-2);border:1px solid var(--card-line);border-radius:12px;padding:8px 14px;
  font-weight:800;font-size:15px;color:var(--ink);opacity:0;animation:ssPop .5s cubic-bezier(.2,.7,.2,1) forwards}
.seed-steps .ss.s3{background:rgba(201,169,97,.16);border-color:var(--gold);color:var(--gold-2);font-size:18px}
.seed-steps .ss-arrow{color:var(--gold);font-weight:700;font-size:12.5px;opacity:0;animation:ssPop .4s ease forwards}
.seed-steps .s1{animation-delay:.1s}
.seed-steps .a1{animation-delay:.55s}
.seed-steps .s2{animation-delay:.8s}
.seed-steps .a2{animation-delay:1.35s}
.seed-steps .s3{animation-delay:1.7s}
@keyframes ssPop{0%{opacity:0;transform:translateY(8px) scale(.92)}60%{opacity:1;transform:translateY(-2px) scale(1.04)}100%{opacity:1;transform:none}}

/* 수익률 반응형 설명 */
.rate-hint{margin-top:8px;font-size:12.5px;color:var(--ink-3);line-height:1.55;min-height:1.5em}
.rate-hint b{color:var(--gold)}

/* 더 깊이 보기 접기 */
.deep-toggle{align-self:center;font-size:13px}
#deepBody{display:flex;flex-direction:column;gap:14px}

.seed-note{font-size:13px;color:var(--ink-2);margin-top:10px;font-weight:600}
.seed-note b{color:var(--gold)}
.seed-assume{font-size:11.5px;color:var(--ink-3);margin-top:4px}
.reach-card{padding:16px}
#viz{width:100%;height:auto;display:block}
.reach-line{text-align:center;font-size:16.5px;font-weight:600;margin-top:8px;line-height:1.55}
.reach-line b{color:var(--gold-2)}
.controls{padding:20px}
.split{display:block;text-align:center;font-size:12.5px;color:var(--ink-2);margin-top:8px;font-weight:600}
.split b{color:var(--gold)}
.pill{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;border:1px solid var(--card-line);background:var(--surface-2);color:var(--ink-2);transition:all .15s ease}
.pill.on{background:var(--gold);border-color:var(--gold);color:#0B1F17}
.partner-head{margin-bottom:0}
#partnerFields{margin-top:16px}
.partner-note{font-size:13px;color:var(--emerald);font-weight:700;margin-top:4px}
.scale{display:flex;justify-content:space-between;font-size:12px;margin-top:5px;color:var(--ink-3)}

/* 사기 vs 렌트 (선택 도시) */
.bvr{padding:20px}
.bvr h3{font-size:15.5px;font-weight:800;margin-bottom:4px}
.bvr .bvr-sub{font-size:12.5px;color:var(--ink-3);margin-bottom:14px}
.bvr-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.bvr-cols{grid-template-columns:1fr}}
.bvr-col{border:1px solid var(--card-line);border-radius:12px;padding:14px;background:var(--surface-2)}
.bvr-col .t{font-size:12px;color:var(--ink-3);font-weight:700;margin-bottom:4px}
.bvr-col .v{font-size:20px;font-weight:800;color:var(--ink)}
.bvr-col.win{border-color:var(--emerald);background:var(--emerald-soft)}
.bvr-col.win .v{color:var(--emerald)}
.bvr-verdict{margin-top:12px;font-size:13.5px;color:var(--ink-2)}
.bvr-verdict b{color:var(--gold)}

/* 한 결정의 무게 */
.weight-h{margin:8px 4px 0;display:flex;align-items:baseline;justify-content:space-between}
.weight-h h3{font-size:16.5px;font-weight:800;letter-spacing:-.01em}
.weight-h p{font-size:12.5px;color:var(--ink-3)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.grid3{grid-template-columns:1fr}}
.wcard{background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.wcard .wt{font-size:12.5px;color:var(--ink-2);font-weight:600;margin-bottom:6px}
.wcard .wv{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.35}
.wcard .wv.good{color:var(--emerald)}
.wcard .wv.bad{color:var(--terra)}

/* 세대 */
.gen-track{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.gen-track{grid-template-columns:1fr}}
.gen-card{background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.gen-card.mid{border-color:var(--gold);background:linear-gradient(180deg,var(--surface) 0%,rgba(201,169,97,.10) 100%)}
.gen-card .gen-tag{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.gen-card h4{font-size:15.5px;font-weight:800}
.gen-card .gen-amt{font-size:21px;font-weight:800;letter-spacing:-.01em;color:var(--gold-2);margin-top:8px}
.gen-card .gen-note{color:var(--ink-2);font-size:12.5px;margin-top:8px;line-height:1.55}

/* 인생 이벤트 */
.events{display:flex;flex-direction:column;gap:14px;max-width:640px;margin:0 auto}
.ev-card{background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);opacity:.45;pointer-events:none;transition:opacity .3s ease}
.ev-card.active{opacity:1;pointer-events:auto;border-color:var(--gold)}
.ev-card.done{opacity:1;pointer-events:auto;border-color:var(--card-line)}  /* 선택 후에도 바꿀 수 있다 */
.ev-age{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.ev-title{font-size:17px;font-weight:800;margin-bottom:12px}
.ev-title .ee{margin-right:8px}
.ev-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.ev-choices{grid-template-columns:1fr}}
.ev-choice{text-align:left;background:var(--surface-2);border:1px solid var(--card-line);border-radius:12px;padding:14px;transition:all .15s ease;color:var(--ink)}
.ev-choice:hover{border-color:var(--gold)}
.ev-choice.picked{background:var(--gold-soft);border-color:var(--gold)}
.ev-choice .cl{font-size:14px;font-weight:700;display:block;margin-bottom:6px}
.ev-choice .cf{font-size:12px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap}
.ev-choice .cf .money-fx{color:var(--gold-2);font-weight:700}
.ev-choice .cf .money-fx.neg{color:var(--terra)}
.ev-choice .cf .happy-fx{color:var(--emerald);font-weight:700}
.ev-choice .cf .happy-fx.neg{color:var(--terra)}
.fx-sub{font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:0}
/* 히든 직업 카드 */
.sit-narrow{max-width:640px;margin:0 auto}
.card.mystery{background:linear-gradient(160deg,#16332A 0%,#0E271D 100%);border-color:var(--line);cursor:pointer}
.card.mystery .ce{filter:grayscale(.2);opacity:.9}
.card.mystery .nm{color:var(--gold);letter-spacing:.2em}
.card.mystery .pr{color:var(--ink-3)}
.card.mystery:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 24px rgba(201,169,97,.18)}
.card.revealing{animation:flipIn .55s cubic-bezier(.2,.7,.2,1) both}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}60%{transform:rotateY(-12deg);opacity:1}100%{transform:rotateY(0)}}
.ev-card.otherjob{opacity:1;pointer-events:auto;cursor:pointer;border-color:var(--emerald);transition:all .18s ease}
.ev-card.otherjob:hover{transform:translateY(-2px);border-color:var(--gold);box-shadow:0 6px 20px rgba(0,0,0,.4)}
/* 현실 터칭 */
.age-reality{margin-top:12px;font-size:13px;color:var(--ink-3);line-height:1.6}
.age-reality b{color:var(--gold-2)}
.reality-card{padding:18px 20px}
.reality-card .rc-t{font-size:14.5px;font-weight:800;color:var(--gold-2);margin-bottom:10px}
.reality-card .rc-row{font-size:13.5px;color:var(--ink-2);margin-bottom:7px;line-height:1.6}
.reality-card .rc-row b{color:var(--ink)}
.reality-card .rc-gap b{color:#E05B4B}
.reality-card .rc-years{padding-top:8px;border-top:1px dashed rgba(255,255,255,.1);color:var(--ink-3);font-size:12.5px}
.reality-card .rc-years b{color:var(--gold-2)}

/* 엔딩 칭호 */
.ending-card{text-align:center;padding:26px 20px}
.end-tag{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.end-emoji{font-size:46px;line-height:1;display:block;margin-bottom:8px;animation:bump .6s cubic-bezier(.2,.7,.2,1)}
.end-title{font-size:25px;font-weight:800;letter-spacing:-.01em;color:var(--gold-2)}
.end-desc{font-size:13.5px;color:var(--ink-2);margin-top:8px;line-height:1.6}

/* 공유 문구 미리보기 */
.share-preview{margin-top:14px;padding:18px 20px;text-align:center}
.sp-label{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.sp-msg{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:12px}
.sp-msg b{color:var(--gold-2)}
#rerollMsg{font-size:12.5px}

/* 갈림길 — 세 경로 + 도전 카드 */
.path-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:640px;margin:0 auto}
@media (max-width:560px){.path-pick{grid-template-columns:1fr}}
.path-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 12px;border-radius:var(--radius);
  background:var(--glass);border:1px solid var(--line);cursor:pointer;text-align:center;transition:border-color .2s,transform .2s}
.path-card:hover{transform:translateY(-2px)}
.path-card.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 10px 30px rgba(201,169,97,.15)}
.path-card .pe{font-size:26px}
.path-card .pn{font-size:15px;font-weight:800;color:var(--ink)}
.path-card .pd{font-size:11.5px;color:var(--ink-3);line-height:1.5}
.chal-card{max-width:640px;margin:16px auto 0;padding:20px 22px;text-align:center}
.chal-tag{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.chal-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:12px}
.chal-rows{display:flex;flex-direction:column;gap:8px;max-width:420px;margin:0 auto}
.chal-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink-2)}
.chal-row .cr-l{min-width:110px;text-align:right;font-size:12px;color:var(--ink-3);font-weight:700}
.chal-row b{color:var(--gold-2)}
.meter{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.meter-fill{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green,#3fa37c),var(--gold));transition:width .5s cubic-bezier(.2,.7,.2,1)}
.meter-fill.mid{background:linear-gradient(90deg,#b98b3f,var(--gold))}
.meter-fill.low{background:linear-gradient(90deg,#a05252,#c98961)}
.chal-note{font-size:12px;color:var(--ink-3);line-height:1.6;margin-top:12px;max-width:44em;margin-inline:auto}
.chal-branch{font-size:14px;color:var(--ink-2);margin-top:12px}
.chal-branch b{color:var(--gold-2)}
.chal-card .btn{margin-top:12px}
.chal-result{font-size:16px;font-weight:800;margin-top:12px;animation:bump .5s cubic-bezier(.2,.7,.2,1)}
.chal-result.win{color:var(--gold-2)}
.chal-result.lose{color:var(--ink-2)}
.chal-card .pill{margin-top:10px}
.card .pr.faint{font-size:11px;color:var(--ink-3)}

/* 인생 이벤트 실시간 트래커 */
.life-live{position:sticky;top:62px;z-index:10;max-width:640px;margin:0 auto 16px;padding:12px 20px;
  display:flex;justify-content:center;gap:34px;flex-wrap:wrap}
.ll-col{display:flex;align-items:baseline;gap:8px}
.ll-l{font-size:11.5px;color:var(--ink-3);font-weight:700}
.ll-v{font-size:16px;letter-spacing:1px}
.ll-v b{color:var(--gold-2);font-size:17px}
.ll-v.bump{animation:bump .4s cubic-bezier(.2,.7,.2,1)}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.life-result{max-width:640px;margin:16px auto 0;padding:22px;text-align:center}
.life-result .lr-row{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:10px}
.life-result .lr-col{min-width:150px}
.life-result .lr-l{font-size:12px;color:var(--ink-3);font-weight:700}
.life-result .lr-v{font-size:26px;font-weight:800;color:var(--gold-2);margin-top:2px}
.life-result .lr-v.hearts{font-size:20px;letter-spacing:2px}
.life-result .lr-note{font-size:13px;color:var(--ink-2);margin-top:12px;line-height:1.6}
.life-score{padding:16px 20px;display:flex;justify-content:center;gap:26px;flex-wrap:wrap;text-align:center}
.life-score .ls-col .lr-l{font-size:11.5px;color:var(--ink-3);font-weight:700}
.life-score .ls-col .lr-v{font-size:20px;font-weight:800;color:var(--gold-2)}

.insight{background:linear-gradient(135deg,rgba(201,169,97,.14) 0%,rgba(63,163,124,.12) 100%);border-radius:var(--radius);padding:20px;border:1px solid var(--line)}
.insight-eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.insight-text{font-size:15px;font-weight:600;line-height:1.6;color:var(--ink)}
.insight-text em{font-style:normal;color:var(--gold-2)}
.cta-box{text-align:center;padding:26px 20px}
.cta-box .btn{margin-top:14px}
.cta-hope{font-size:22px;font-weight:800;letter-spacing:-.01em;color:var(--ink);line-height:1.45;margin-bottom:10px}
.cta-hope em{font-style:normal;color:var(--gold-2)}
.cta-box .insight-text{margin-bottom:8px;font-weight:500;color:var(--ink-2)}
.cta-box .insight-text:last-of-type{margin-bottom:0;font-weight:600;color:var(--ink)}
.disclaim{text-align:center;color:var(--ink-3);font-size:11.5px;margin-top:18px;max-width:40em;margin-inline:auto}
.privacy-line{margin-top:18px;font-size:12px;color:var(--ink-3)}
.insights-link{color:var(--gold);font-weight:700;font-size:13.5px;text-decoration:none;border-bottom:1px dashed var(--gold)}
.insights-link:hover{color:var(--gold-2)}

/* EU 쿠키 안내 (기능성 저장소만 — 추적 없음) */
.cookiebar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:65;max-width:640px;width:calc(100% - 32px);
  background:var(--surface-2);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
  padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-2)}
.cookiebar a{color:var(--gold);font-weight:700;text-decoration:none;white-space:nowrap}
.cookiebar .cookie-ok{margin-left:auto;padding:7px 18px;font-size:12.5px}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(16px);z-index:70;background:var(--gold);color:#0B1F17;padding:12px 22px;border-radius:10px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}

</style>
</head>
<body>
  <div class="progress" id="progress" aria-hidden="true"><span id="progressFill"></span></div>

  <header class="topbar">
    <div class="topbar-inner">
      <button class="brand-btn" type="button" data-go="0" aria-label="ARBITORIA">
        <div class="brand-mark">A</div>
        ARBITORIA <span class="brand-sub">Dream Simulation</span>
      </button>
      <a class="topbar-link" href="https://arbitoria.com/insights" target="_blank" rel="noopener">🌍 Insights</a>
    </div>
  </header>

  <main id="stage">

    <!-- 0. 언어 -->
    <section class="screen center" data-screen="0">
      <div class="glass hero">
        <p class="eyebrow">DREAM · SIMULATION</p>
        <h1 class="dreamy" id="coverTitle" data-i18n="cover.title">미래의 나를<br/>꿈꾸다</h1>
        <p class="lang-sub" data-i18n="cover.sub"></p>
        <div class="row wrap gap" id="langRow">
          <button class="btn lang-btn" data-lang="ko" type="button">한국어</button>
          <button class="btn lang-btn" data-lang="en" type="button">English</button>
          <button class="btn lang-btn" data-lang="fr" type="button">Français</button>
        </div>
        <button class="btn glow start-btn" id="startBtn" data-go="1" data-i18n="cover.start">시작하기</button>
        <p class="privacy-line" data-i18n="cover.privacy"></p>
      </div>
    </section>

    <!-- 1. 성별 -->
    <section class="screen center" data-screen="1" hidden>
      <div class="glass panel">
        <h2 class="dreamy" data-i18n="gender.h"></h2>
        <div class="choice-row" id="genderRow"></div>
      </div>
      <nav class="s-nav"><button class="btn ghost" data-go="0" data-i18n="nav.back"></button><button class="btn glow" data-go="2" data-i18n="nav.next"></button></nav>
    </section>

    <!-- 2. 나이 -->
    <section class="screen center" data-screen="2" hidden>
      <div class="glass panel">
        <h2 class="dreamy" data-i18n="age.h"></h2>
        <output class="big-num" id="ageBig">30</output>
        <input type="range" id="age" min="15" max="70" step="1" value="30" />
        <p class="muted" data-i18n="age.hint"></p>
        <p class="age-reality" id="ageReality"></p>
      </div>
      <nav class="s-nav"><button class="btn ghost" data-go="1" data-i18n="nav.back"></button><button class="btn glow" data-go="3" data-i18n="nav.next"></button></nav>
    </section>

    <!-- 3. 직업 -->
    <section class="screen" data-screen="3" hidden>
      <header class="s-head"><p class="step-no" data-i18n="path.tag"></p><h2 data-i18n="path.h"></h2><p class="s-sub" data-i18n="path.sub"></p></header>
      <div class="path-pick" id="pathPick">
        <button class="path-card" data-path="now" type="button"><span class="pe">🌱</span><span class="pn" data-i18n="path.now"></span><span class="pd" data-i18n="path.nowD"></span></button>
        <button class="path-card" data-path="future" type="button"><span class="pe">🎴</span><span class="pn" data-i18n="path.future"></span><span class="pd" data-i18n="path.futureD"></span></button>
        <button class="path-card" data-path="startup" type="button"><span class="pe">🚀</span><span class="pn" data-i18n="path.startup"></span><span class="pd" data-i18n="path.startupD"></span></button>
      </div>

      <div id="futureBlock" hidden>
        <div class="s-head" style="margin-top:26px;margin-bottom:16px">
          <p class="step-no" data-i18n="job.hiddenTag"></p>
          <h2 style="font-size:clamp(18px,3vw,22px)" data-i18n="job.hiddenH"></h2>
          <p class="s-sub" data-i18n="job.hiddenSub"></p>
        </div>
        <div class="grid" id="gridJob"></div>
      </div>

      <div id="startupBlock" hidden>

            <span class="ft"><span data-i18n="path.targetOut"></span><output id="startupOut"></output></span>

        </div>
      </div>

      <div class="glass chal-card" id="chalCard" hidden></div>

      <div class="s-head" style="margin-top:34px;margin-bottom:16px">
        <p class="step-no" data-i18n="job.step"></p>
        <h2 style="font-size:clamp(18px,3vw,22px)" data-i18n="job.h"></h2>
        <p class="s-sub" data-i18n="job.sub"></p>
      </div>
      <div class="glass controls sit-narrow" id="customJobField">
        <span class="ft"><span data-i18n="job.customLabel"></span></span>
        <label class="field">
          <span class="ft"><span data-i18n="fx.krw"></span><output id="customKrwOut"></output></span>
          <input type="range" id="customKrw" min="50" max="5000" step="10" value="330" />

        <label class="field">
          <span class="ft"><span data-i18n="fx.eur"></span><output id="customEurOut"></output></span>
          <input type="range" id="customEur" min="300" max="34000" step="50" value="2200" />
        </label>
        <p class="mort-note" id="fxNote"></p>
      </div>
      <p class="split" id="jobLine" style="margin-top:14px"></p>

      <nav class="s-nav"><button class="btn ghost" data-go="2" data-i18n="nav.back"></button><button class="btn glow" data-go="4" data-i18n="nav.next"></button></nav>
    </section>

    <!-- 4. 나의 현실 -->
    <section class="screen" data-screen="4" hidden>
      <header class="s-head"><p class="step-no" data-i18n="sit.step"></p><h2 data-i18n="sit.h"></h2><p class="s-sub" data-i18n="sit.sub"></p></header>

              <button data-tenure="rent" type="button" data-i18n="sit.rent"></button>
              <button data-tenure="own" type="button" data-i18n="sit.own"></button>

        <div class="glass">
          <label class="field">

          <label class="field">
            <span class="ft"><span data-i18n="sit.save"></span><output id="saveOut"></output></span>
            <input type="range" id="saveAmt" min="0" max="1500" step="10" value="60" />

          <label class="field">
            <span class="ft"><span data-i18n="sit.assets"></span><output id="assetsOut"></output></span>
            <input type="range" id="assets" min="0" max="200000" step="500" value="3000" />

      <nav class="s-nav"><button class="btn ghost" data-go="6" data-i18n="nav.back"></button><button class="btn glow" data-go="8" data-i18n="nav.next"></button></nav>

function fv(p, pmt, ratePct, months) {
  const r = ratePct / 100 / 12;
  if (r === 0) return p + pmt * months;
  return p * Math.pow(1 + r, months) + pmt * ((Math.pow(1 + r, months) - 1) / r);
}
function mortgage(P, ratePct, years) {
  const r = ratePct / 100 / 12, n = years * 12;
  if (P <= 0 || n <= 0) return 0;
  if (r === 0) return P / n;
  return (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}
function splitPayment(P, ratePct, years) {
  const pay = mortgage(P, ratePct, years);
  const interest = P * (ratePct / 100 / 12);
  const principal = Math.max(0, pay - interest);
  return { pay, interest, principal };
}
function buyVsRent(f) {
  const years = Math.max(1, f.loanYears || 25), N = years * 12;

  const down = f.downPayment || 0, homeValue = f.homeValue || 0;

  const mort = mortgage(effLoan, f.loanRate || 0, years);
  const estRent = (f.monthlyRent || 0) > 0 ? f.monthlyRent : homeValue * 0.04 / 12;
  const budget = Math.max(mort, estRent);
  let buyInvest = 0, rentInvest = down, rent = estRent;
  for (let m = 1; m <= N; m++) {
    buyInvest = buyInvest * (1 + ri) + (budget - mort);
    rentInvest = rentInvest * (1 + ri) + (budget - rent);
    if (m % 12 === 0) rent *= (1 + rg);
  }
  const homeFuture = homeValue * Math.pow(1 + rg, years);
  return { buyEnd: homeFuture + buyInvest, rentEnd: rentInvest, diff: (homeFuture + buyInvest) - rentInvest };
}

function t(k, p) { let s = (L[lang] && L[lang][k]) != null ? L[lang][k] : (L.ko[k] != null ? L.ko[k] : k); if (p) for (const x in p) s = s.replace(new RegExp('\\{' + x + '\\}', 'g'), p[x]); return s; }

/* ── 금액 포맷 ── */
function wonKo(v) {
  v = Math.round(v); if (v <= 0) return '0';
  const eok = Math.floor(v / 10000), man = v % 10000;
  if (eok > 0) { if (man === 0) return `${eok}억`; const c = Math.round(man / 1000); if (c >= 1 && c <= 9 && man % 1000 < 500) return `${eok}억 ${c}천`; return `${eok}억 ${man.toLocaleString()}만`; }
  if (v >= 1000) return `${v.toLocaleString()}만원`; return `${v}만원`;
}
const FX = { en: { cur: 'USD', locale: 'en-US', rate: 1400 }, fr: { cur: 'EUR', locale: 'fr-FR', rate: 1500 } };
let fxMonth = null;
/* 매달 갱신되는 실환율 (같은 오리진의 /api/fx — 없으면 기본값 유지) */
function loadFx() {
  try {
    fetch('/api/fx').then((r) => r.json()).then((d) => {
      if (d && d.usd_krw > 0 && d.eur_krw > 0) {
        FX.en.rate = d.usd_krw; FX.fr.rate = d.eur_krw; fxMonth = d.month;
        if (screen === 3) renderJobs();

    }).catch(() => {});
  } catch (_) {}
}
function money(manwon) {
  if (lang === 'ko') return wonKo(manwon);
  const fx = FX[lang] || FX.en;
  return new Intl.NumberFormat(fx.locale, { style: 'currency', currency: fx.cur, notation: 'compact', maximumFractionDigits: 1 }).format(Math.round(manwon) * 10000 / fx.rate);
}
/* 나머지 두 통화로 환산한 꼬리표 (예: ko면 "$782 · €678") */
function fxCompact(v, cur, loc) { return new Intl.NumberFormat(loc, { style: 'currency', currency: cur, notation: 'compact', maximumFractionDigits: 1 }).format(v); }
function moneyFx(manwon) {
  const krw = Math.round(manwon) * 10000;
  const usd = fxCompact(krw / FX.en.rate, 'USD', 'en-US');
  const eur = fxCompact(krw / FX.fr.rate, 'EUR', 'fr-FR');
  const wk = '₩' + new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 1 }).format(krw);
  if (lang === 'ko') return usd + ' · ' + eur;
  if (lang === 'en') return wk + ' · ' + eur;
  return wk + ' · ' + usd;
}
function money3(manwon) { return money(manwon) + ' <span class="fx-sub">' + moneyFx(manwon) + '</span>'; }

/* ═══ 나의 현실 → 진단 (computeMember 이식·간소화) ═══ */
function computeMe() {
  const income = S.salary;
  const isOwn = S.tenure === 'own', isRent = S.tenure === 'rent';
  const effLoan = isOwn ? S.homeValue * (1 - DOWN_PCT) : 0;
  const sp = isOwn ? splitPayment(effLoan, LOAN_RATE, LOAN_YEARS) : { pay: 0, interest: 0, principal: 0 };
  const rentPaid = isRent ? S.rent : 0;
  const housingOutflow = isOwn ? sp.pay : rentPaid;
  const housingCost = isOwn ? sp.interest : rentPaid;   // 순수 비용(새는 곳)
  const saving = S.save + sp.principal;                  // 진짜 저축(원금 포함)
  const living = Math.max(0, income - housingOutflow - S.fixedCost - S.save);
  const saveRate = income > 0 ? saving / income * 100 : 0;
  return { income, isOwn, isRent, effLoan, ...sp, housingOutflow, housingCost, saving, living, saveRate };
}

/* ═══ 꿈 · 종자돈 ═══ */
/* 여행 1회 비용 = m×12 (기존 월예산은 '1년에 한 번' 기준) → 빈도로 월 환산 */
function tripPerTrip() { return mOf('trip', S.trip) * 12; }
function tripMonthly() { return Math.round(tripPerTrip() / S.tripFreq); }
function dreamMonthly() { return mOf('car', S.car) + mOf('home', S.home) + tripMonthly(); }
function buyTotal() { return priceOf('car', S.car) + priceOf('home', S.home) + priceOf('trip', S.trip); }
function taxRate() { return TAXES[S.country] != null ? TAXES[S.country] : 0.154; }
function seedNeeded() { return dreamMonthly() * 12 / (1 - taxRate()) / 0.04; }

/* ── 도전 (미래 직업 · 창업) — 확률·준비기간·성공 시 수입 ── */
function challengeInfo() {
  if (S.jobPath === 'future') {
    const j = jobOf(S.jobTarget) || JOBS[5];
    return { targetSal: j.sal, prob: j.prob, years: j.years, label: j.nm[lang] || j.nm.ko, e: j.e };
  }
  if (S.jobPath === 'startup') {
    /* 야망 배율에 반비례하는 확률 — 5년 생존율 통계의 단순화 */
    const base = Math.max(S.salary, 100);
    const lg = Math.log2(Math.max(S.startupIncome / base, 1));
    const prob = clamp(50 - 14 * lg, 3, 50);
    const years = clamp(2 + 1.2 * lg, 2, 10);
    return { targetSal: S.startupIncome, prob, years, label: t('path.startup'), e: '🚀' };
  }
  return null;
}
/* 성공 시: 수입 변화의 절반이 저축에 반영 (가정) — 목표가 지금보다 낮으면 음수도 정직하게 */
function chalBoost() {
  const ci = challengeInfo();
  return ci ? Math.round((ci.targetSal - S.salary) * 0.5) : 0;
}
let chalMode = null;   // null=상태(S.challenge) 따름 · 'win'/'lose' = 가지 계산용 강제
function chalActive(m) {
  const ci = challengeInfo();
  if (!ci) return false;
  const won = chalMode ? chalMode === 'win' : S.challenge === 1;
  return won && m / 12 >= ci.years;
}
function monthsToReachMode(N, mode) { chalMode = mode; const r = monthsToReach(N); chalMode = null; return r; }

function contribAt(m, extra, noEvents) {
  let c = S.save + (extra || 0);
  if (chalActive(m)) c += chalBoost();
  if (S.partner && S.age + m / 12 >= S.partnerAge) c += S.partnerMonthly;
  if (!noEvents) {
    for (let i = 0; i < EVENTS.length; i++) {
      const pick = S.events[i];
      if (!pick) continue;
      if (m / 12 >= EVENTS[i].offset) c += (pick === 1 ? EVENTS[i].a : EVENTS[i].b).save;
    }
  }
  return Math.max(0, c);
}
function monthsToReach(N, o) {
  o = o || {};
  const r = S.rate / 100 / 12; let bal = S.assets;
  if (bal >= N) return 0;
  const cap = (100 - S.age) * 12;
  const bak = S.partner;
  if (o.noPartner) S.partner = false;
  for (let m = 1; m <= cap; m++) {
    bal = bal * (1 + r) + contribAt(m, o.extra, o.noEvents);
    if (bal >= N) { S.partner = bak; return m; }
  }
  S.partner = bak;
  return Infinity;
}
function happiness() {
  let h = HAPPY_BASE;
  EVENTS.forEach((ev, i) => { const p = S.events[i]; if (p) h += (p === 1 ? ev.a : ev.b).happy; });
  return Math.max(0, Math.min(10, h));
}
function monthlyNeeded(P, months, ratePct) {
  if (months <= 0 || P <= 0) return 0;
  const r = ratePct / 100 / 12;
  if (r === 0) return P / months;
  return P * r / (Math.pow(1 + r, months) - 1);
}

let shareMsgIdx = -1;
function buildShareMsg(idx) {
  const N = seedNeeded();
  const months = monthsToReach(N);
  const reachAge = months === Infinity ? '?' : S.age + Math.round(months / 12);
  const ending = t('end.' + endingOf(months, reachAge === '?' ? 999 : reachAge, happiness()));
  const dm = dreamMonthly();
  const pen = PENSION_MW[S.country] != null ? PENSION_MW[S.country] : 65;
  const gap = dm - pen;
  let pool = SHARE_MSGS[lang] || SHARE_MSGS.ko;
  // 간극이 없거나 미도달이면 해당 템플릿 제외
  const usable = pool.map((m, i) => ({ m, i }))
    .filter((x) => !(x.m.includes('{gap}') && gap <= 0))
    .filter((x) => !(x.m.includes('{age}') && reachAge === '?'));
  const pick = idx != null && usable.some((u) => u.i === idx)
    ? usable.find((u) => u.i === idx)
    : usable[Math.floor(Math.random() * usable.length)];
  shareMsgIdx = pick.i;
  const penLabel = t('pen.' + S.country) + ' ' + (lang === 'ko' ? '월 ' : '') + money(pen) + (lang === 'ko' ? '' : '/mo');
  return pick.m
    .replace('{age}', reachAge)
    .replace('{ending}', ending)
    .replace('{gap}', money(Math.max(0, gap)))
    .replace('{pen}', penLabel)
    .replace('{m}', money(dm));
}
let currentShareMsg = '';
function updateShareMsg(reroll) {
  let next = buildShareMsg(null);
  if (reroll) {
    // 같은 문구 연속 방지
    let guard = 0;
    while (next === currentShareMsg && guard++ < 5) next = buildShareMsg(null);
  }
  currentShareMsg = next;
  $('shareMsgText').textContent = currentShareMsg;
}

  if (reachAge <= 45) return h >= 7 ? 'legend' : 'vault';

  if (h >= 7) return 'gardener';

  return 'walker';
}

  let delayX = null;
  if (months !== Infinity) {
    const lateMonths = months - 120;
    if (lateMonths > 0 && S.save > 0) delayX = (monthlyNeeded(N, lateMonths, S.rate) / S.save).toFixed(1);
  }
  const infl = N * Math.pow(1.04, 30);
  $('weightCards').innerHTML = `
    <div class="wcard"><div class="wt">${t('weight.plus30')}</div>
      <div class="wv good">${savedY !== null && savedY >= 1 ? t('weight.plus30f', { y: savedY }) : '—'}</div></div>
    <div class="wcard"><div class="wt">${t('weight.delay')}</div>
      <div class="wv bad">${delayX !== null && delayX > 1 ? t('weight.delayf', { x: delayX }) : '—'}</div></div>
    <div class="wcard"><div class="wt">${t('weight.nothing')}</div>
      <div class="wv bad">${t('weight.nothingf', { v: money(infl) })}</div></div>`;
}

/* ── 11. 세대 ── */
function renderGen() {
  const N = seedNeeded();
  const months = monthsToReach(N);
  const reachAge = months === Infinity ? S.age + 30 : S.age + Math.round(months / 12);
  const h = happiness();
  const jName = jobLabel();
  const endKey = endingOf(months, reachAge, h);
  $('endingCard').innerHTML = `
    <div class="end-tag">${t('end.tag')}</div>
    <span class="end-emoji">${t('end.' + endKey).split(' ')[0]}</span>
    <div class="end-title">${t('end.' + endKey).split(' ').slice(1).join(' ')}</div>
    <div class="end-desc">${t('end.' + endKey + 'D')}</div>`;
  $('lifeScore').innerHTML = `
    <div class="ls-col"><div class="lr-l">${t('life.scoreJob')}</div><div class="lr-v">${jName}</div></div>
    <div class="ls-col"><div class="lr-l">${t('life.scoreReach')}</div><div class="lr-v">${months === Infinity ? '∞' : reachAge + (lang === 'ko' ? '세' : '')}</div></div>
    <div class="ls-col"><div class="lr-l">${t('life.happy')}</div><div class="lr-v">${'❤️'.repeat(Math.round(h / 2))} ${h}/10</div></div>`;
  drawViz(N, months, $('vizFinal'));
  $('reachLineFinal').innerHTML = months === Infinity ? t('calc.reachNone')
    : t('calc.reach', { y: Math.max(1, Math.round(months / 12)), age: reachAge, m: money(dreamMonthly()) });
  const r = S.rate / 100;
  const g2 = N * Math.pow(1 + r, 30), g3 = N * Math.pow(1 + r, 60);
  $('genTrack').innerHTML = `
    <div class="gen-card"><div class="gen-tag">${t('gen.g1')}</div>
      <h4>${t('gen.g1when', { age: reachAge })}</h4>
      <div class="gen-amt">${money(N)}</div><div class="gen-note">${t('gen.g1note')}</div></div>
    <div class="gen-card mid"><div class="gen-tag">${t('gen.g2')}</div>
      <h4>${t('gen.g2when')}</h4>
      <div class="gen-amt">${money(g2)}</div><div class="gen-note">${t('gen.g2note')}</div></div>
    <div class="gen-card"><div class="gen-tag">${t('gen.g3')}</div>
      <h4>${t('gen.g3when')}</h4>
      <div class="gen-amt">${money(g3)}</div><div class="gen-note">${t('gen.g3note')}</div></div>`;
  updateShareMsg();
}

/* ═══ 시각화 ═══ */
function drawViz(N, months, svgEl) {
  const svg = svgEl || $('viz'), W = 520, H = 240, padL = 14, padR = 14, padT = 20, padB = 30;
  const x0 = padL, x1 = W - padR, y0 = H - padB, y1 = padT;
  const r = S.rate / 100 / 12;
  const endM = months === Infinity ? (100 - S.age) * 12 : Math.round(months * 1.12);
  const pts = []; let bal = S.assets;
  for (let m = 0; m <= endM; m++) {
    if (m % Math.max(1, Math.round(endM / 110)) === 0 || m === endM) pts.push({ m, bal });
    bal = bal * (1 + r) + contribAt(m);
  }
  const maxY = Math.max(N * 1.1, pts[pts.length - 1].bal, 1);
  const sx = (m) => x0 + m / endM * (x1 - x0);
  const sy = (v) => y0 - Math.min(v, maxY) / maxY * (y0 - y1);
  const path = pts.map((p, i) => `${i ? 'L' : 'M'}${sx(p.m).toFixed(1)},${sy(p.bal).toFixed(1)}`).join(' ');
  const area = `${path} L${x1},${y0} L${x0},${y0} Z`;
  const pY = sy(N);
  const rx = months === Infinity ? null : sx(months);

  let ticks = '';
  for (let yy = 10; yy <= (100 - S.age); yy += 10) {
    const mm = yy * 12; if (mm > endM) break;
    ticks += `<text x="${sx(mm).toFixed(1)}" y="${y0 + 18}" font-size="10.5" fill="#7E9284" text-anchor="middle" font-family="Pretendard">${S.age + yy}${lang === 'ko' ? '세' : ''}</text>`;
  }
  let joinMark = '';
  if (S.partner) {
    const jm = (S.partnerAge - S.age) * 12;
    if (jm > 0 && jm < endM) {
      const jx = sx(jm);
      joinMark = `<line x1="${jx.toFixed(1)}" y1="${y1}" x2="${jx.toFixed(1)}" y2="${y0}" stroke="#3FA37C" stroke-width="1.2" stroke-dasharray="3 4"/>
        <text x="${jx.toFixed(1)}" y="${y1 - 6}" font-size="10.5" fill="#3FA37C" text-anchor="middle" font-family="Pretendard" font-weight="700">💑 ${S.partnerAge}${lang === 'ko' ? '세' : ''}</text>`;
    }
  }
  svg.innerHTML = `
    <defs><linearGradient id="vz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A961" stop-opacity=".4"/><stop offset="1" stop-color="#C9A961" stop-opacity="0"/></linearGradient></defs>
    <line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y0}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>${ticks}
    <line x1="${x0}" y1="${pY.toFixed(1)}" x2="${x1}" y2="${pY.toFixed(1)}" stroke="#E4C77B" stroke-width="1.2" stroke-dasharray="3 5"/>
    <text x="${x1}" y="${(pY - 19).toFixed(1)}" font-size="11.5" fill="#E4C77B" text-anchor="end" font-family="Pretendard" font-weight="700">${money(N)}</text>
    <text x="${x1}" y="${(pY - 6).toFixed(1)}" font-size="10.5" fill="#E4C77B" text-anchor="end" font-family="Pretendard">${t('viz.tree', { m: money(dreamMonthly()) })}</text>
    ${joinMark}
    <path d="${area}" fill="url(#vz)"/>
    <path d="${path}" fill="none" stroke="#C9A961" stroke-width="2.5" stroke-linejoin="round"/>
    ${rx !== null ? `<circle cx="${rx.toFixed(1)}" cy="${pY.toFixed(1)}" r="5.5" fill="#C9A961" stroke="#0B1F17" stroke-width="2"/>` : ''}`;
}

/* ═══ 공유 (해시 · 19필드) ═══ */
const ci = (cat, id) => CATS[cat].findIndex((o) => o.id === id);
function encodeState(scrOverride) {
  const scr = scrOverride != null ? scrOverride : screen;
  return [LANGS.indexOf(lang), ['female', 'male', 'other'].indexOf(S.gender) + 1, S.age,
    S.salary, TENURES.indexOf(S.tenure), S.homeValue, S.rent, S.fixedCost, S.save, S.assets,
    ci('car', S.car), ci('home', S.home), ci('trip', S.trip),
    S.rate, COUNTRIES.indexOf(S.country),
    S.partner ? 1 : 0, S.partnerAge, S.partnerMonthly, S.tripFreq,
    S.job === 'custom' ? 11 : JOBS.findIndex((j) => j.id === S.job) + 1,
    S.events.reduce((a, v, i) => a + v * Math.pow(3, i), 0),
    scr,
    PATHS.indexOf(S.jobPath), JOBS.findIndex((j) => j.id === S.jobTarget) + 1, S.startupIncome, S.challenge].join('.');
}
function decodeState(str) {
  const p = str.split('.').map(Number); if (p.length < 22 || p.some(isNaN)) return;
  lang = LANGS[p[0]] || 'ko';
  S.gender = ['female', 'male', 'other'][p[1] - 1] || null;
  S.age = clamp(p[2], 15, 70);
  S.salary = clamp(p[3], 0, 2000); S.tenure = TENURES[p[4]] || 'none';
  S.homeValue = clamp(p[5], 0, 300000); S.rent = clamp(p[6], 0, 500);
  S.fixedCost = clamp(p[7], 0, 600); S.save = clamp(p[8], 0, 1200); S.assets = clamp(p[9], 0, 200000);
  S.car = (CARS[p[10]] || CARS[0]).id; S.home = (HOMES[p[11]] || HOMES[0]).id; S.trip = (TRIPS[p[12]] || TRIPS[0]).id;
  S.rate = [5, 7, 10].includes(p[13]) ? p[13] : 7;
  S.country = COUNTRIES[p[14]] || 'kr';
  S.partner = !!p[15]; S.partnerAge = clamp(p[16], 15, 80); S.partnerMonthly = clamp(p[17], 0, 1500);
  S.tripFreq = [1, 2, 6, 12].includes(p[18]) ? p[18] : 12;
  S.job = p[19] === 11 ? 'custom' : (p[19] >= 1 && p[19] <= JOBS.length ? JOBS[p[19] - 1].id : 'custom');
  if (S.job !== 'custom' && !revealed.includes(S.job)) revealed.push(S.job);
  let ec = clamp(p[20], 0, 242);
  S.events = S.events.map(() => { const v = ec % 3; ec = Math.floor(ec / 3); return v; });
  /* v2 필드 (옛 링크에는 없음 — 그땐 기본 경로로 리셋) */
  if (p.length >= 26) {
    S.jobPath = PATHS[p[22]] || 'now';
    S.jobTarget = (JOBS[p[23] - 1] || JOBS[5]).id;
    S.startupIncome = clamp(p[24], 100, 3000);
    S.challenge = clamp(p[25], 0, 2);
    if (S.jobPath === 'future' && !revealed.includes(S.jobTarget)) revealed.push(S.jobTarget);
  } else {
    S.jobPath = 'now'; S.challenge = 0;
  }
  return clamp(p[21] || 0, 0, 11);
}
function clamp(v, a, b) { return Math.max(a, Math.min(b, Math.round(v || 0))); }
function updateHash() { const u = new URL(location.href); u.hash = 'd=' + encodeState(); history.replaceState(null, '', u); }
async function share() {
  /* 공유 링크는 항상 그래프가 있는 계산 화면(9)으로 열린다 · 링크가 아니라 질문을 보낸다 */
  const u = new URL(location.href);
  u.hash = 'd=' + encodeState(9);
  const link = u.toString();
  if (!currentShareMsg) updateShareMsg();
  const msg = currentShareMsg;
  try { if (navigator.share) { await navigator.share({ title: 'Dream Simulation — ARBITORIA', text: msg, url: link }); return; } } catch (_) {}
  try { await navigator.clipboard.writeText(msg + '\n' + link); toast(t('toast.copiedMsg')); } catch (_) { toast(t('toast.manual')); }
}
let toastT; function toast(m) { const el = $('toast'); el.textContent = m; el.classList.add('show'); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2400); }

/* ═══ 이벤트 ═══ */
let rafP = false; function schedule(fn) { if (rafP) return; rafP = true; requestAnimationFrame(() => { rafP = false; fn(); }); }

function bind() {
  document.body.addEventListener('click', (e) => {
    const lb = e.target.closest('[data-lang]'); if (lb) { applyLang(lb.dataset.lang); S.country = { ko: 'kr', en: 'us', fr: 'fr' }[lb.dataset.lang] || 'kr'; updateHash(); return; }
    const g = e.target.closest('[data-go]'); if (g) { go(+g.dataset.go); return; }
    const gd = e.target.closest('[data-gender]'); if (gd) { S.gender = gd.dataset.gender; renderGender(); updateHash(); return; }
    const pb = e.target.closest('[data-path]'); if (pb) {
      S.jobPath = pb.dataset.path; S.challenge = 0;
      S.job = S.jobPath === 'future' ? S.jobTarget : 'custom';
      renderJobs(); updateHash(); return;
    }
    const jb = e.target.closest('[data-job]'); if (jb) {
      const id = jb.dataset.job;
      const j = jobOf(id);
      if (j) {
        if (!revealed.includes(id)) { revealed.push(id); lastReveal = id; }
        S.jobPath = 'future'; S.jobTarget = id; S.job = id; S.challenge = 0;   // 현재 수입은 그대로 — 직업은 '도전 대상'
      }
      renderJobs(); updateHash(); return;
    }
    if (e.target.closest('#rollBtn')) { rollChallenge(); renderChalCard9(); schedule(updateReach); return; }
    const ec = e.target.closest('.ev-choice'); if (ec) {
      S.events[+ec.dataset.ev] = +ec.dataset.pick;
      renderEvents(); updateHash(); return;
    }
    if (e.target.closest('#otherJobCard')) { go(3); return; }
    const tn = e.target.closest('#tenure button'); if (tn) { S.tenure = tn.dataset.tenure; [...tn.parentElement.children].forEach((x) => x.classList.toggle('on', x === tn)); syncSitOutputs(); updateHash(); return; }
    const card = e.target.closest('.card'); if (card && card.dataset.cat) { S[card.dataset.cat] = card.dataset.id; [...card.parentElement.children].forEach((x) => x.classList.toggle('on', x === card)); if (card.dataset.cat === 'trip') syncTripFreq(); updateHash(); return; }
    const fq = e.target.closest('#tripFreq button'); if (fq) { S.tripFreq = +fq.dataset.freq; syncTripFreq(); updateHash(); return; }
    const rb = e.target.closest('#rate button'); if (rb) { S.rate = +rb.dataset.rate; [...rb.parentElement.children].forEach((x) => x.classList.toggle('on', x === rb)); schedule(updateReach); updateHash(); return; }
    const cb = e.target.closest('#country button'); if (cb) { S.country = cb.dataset.country; [...cb.parentElement.children].forEach((x) => x.classList.toggle('on', x === cb)); schedule(updateReach); updateHash(); return; }
    if (e.target.closest('#partnerBtn')) {
      S.partner = !S.partner;
      if (S.partner && S.partnerAge < S.age) S.partnerAge = Math.min(80, S.age + 5);
      $('partnerBtn').classList.toggle('on', S.partner);
      $('partnerBtn').innerHTML = t(S.partner ? 'calc.partnerOn' : 'calc.partnerBtn');
      $('partnerFields').hidden = !S.partner;
      $('partnerAge').value = S.partnerAge;
      schedule(updateReach); updateHash(); return;
    }
    if (e.target.closest('#shareBtn')) { share(); return; }
    if (e.target.closest('#rerollMsg')) { updateShareMsg(true); return; }
    if (e.target.closest('#ctaBtn')) { window.open('https://arbitoria.com/family-office', '_blank'); return; }
    if (e.target.closest('#cookieOk')) { try { localStorage.setItem('cookieAck', '1'); } catch (_) {} $('cookieBar').hidden = true; return; }
    if (e.target.closest('#deepToggle')) {
      const body = $('deepBody');
      body.hidden = !body.hidden;
      $('deepToggle').innerHTML = t(body.hidden ? 'calc.deeper' : 'calc.deeperClose');
      return;
    }
  });
  document.body.addEventListener('input', (e) => {
    const el = e.target; if (el.type !== 'range') return;
    const v = +el.value;
    if (el.id === 'age') { S.age = v; $('ageBig').textContent = S.age + (lang === 'ko' ? '세' : ''); renderAgeReality(); updateHash(); return; }
    if (el.id === 'customKrw' || el.id === 'customUsd' || el.id === 'customEur') {
      if (el.id === 'customKrw') S.salary = v;
      else if (el.id === 'customUsd') S.salary = Math.round(v * FX.en.rate / 10000);
      else S.salary = Math.round(v * FX.fr.rate / 10000);
      S.salary = clamp(S.salary, 50, 5000);
      S.save = Math.round(S.salary * 0.3);
      S.challenge = 0;   // 수입이 바뀌면 확률도 바뀐다 — 주사위 리셋
      syncCustomSal(); syncJobLine(); renderChalCard();
      updateHash(); return;
    }
    if (el.id === 'startupIncome') { S.startupIncome = v; S.challenge = 0; syncStartup(); renderChalCard(); syncJobLine(); updateHash(); return; }
    if (el.id === 'salary') S.salary = v;
    else if (el.id === 'rent') S.rent = v;
    else if (el.id === 'homeValue') S.homeValue = v;
    else if (el.id === 'fixedCost') S.fixedCost = v;
    else if (el.id === 'saveAmt') S.save = v;
    else if (el.id === 'assets') S.assets = v;
    else if (el.id === 'calcSave') { S.save = v; schedule(updateReach); updateHash(); return; }
    else if (el.id === 'partnerAge') { S.partnerAge = Math.max(S.age, v); el.value = S.partnerAge; schedule(updateReach); updateHash(); return; }
    else if (el.id === 'partnerMonthly') { S.partnerMonthly = v; schedule(updateReach); updateHash(); return; }
    else return;
    syncSitOutputs(); updateHash();
  });

  // 직접 핸들러 (위임 실패 대비)
  document.querySelectorAll('[data-lang]').forEach((b) => b.addEventListener('click', (ev) => { ev.stopPropagation(); applyLang(b.dataset.lang); S.country = { ko: 'kr', en: 'us', fr: 'fr' }[b.dataset.lang] || 'kr'; updateHash(); }));
  document.querySelectorAll('[data-go]').forEach((b) => b.addEventListener('click', (ev) => { ev.stopPropagation(); go(+b.dataset.go); }));
}

/* 엔진 검증 (GAME_HANDOFF §10 예제 — 콘솔에서 __validate()) */
window.__validate = function () {
  return {
    mortgage_256k_3p5_25: Math.round(mortgage(256000, 3.5, 25)),      // ≈1282
    split_interest: Math.round(splitPayment(256000, 3.5, 25).interest), // ≈747
    split_principal: Math.round(splitPayment(256000, 3.5, 25).principal), // ≈535
    fv_28k_600_5_396: Math.round(fv(28000, 600, 5, 396)),             // ≈748536
  };
};

function init() {
  const h = location.hash.match(/d=([\d.]+)/); let start = 0;
  if (h) { const s = decodeState(h[1]); if (s !== undefined) start = s; }
  applyLang(lang); bind(); go(start || 0);
  loadFx();
  try { if (!localStorage.getItem('cookieAck')) $('cookieBar').hidden = false; } catch (_) {}
}
init();

</script>
