<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Privacy & Cookies — ARBITORIA</title>
<meta name="description" content="ARBITORIA privacy & cookie policy — no personal data, no tracking." />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{--bg:#0B1F17;--surface:#122A20;--surface-2:#1A3A2C;--card-line:rgba(255,255,255,.08);
--ink:#F2EEE3;--ink-2:#BFCDC0;--ink-3:#7E9284;--gold:#C9A961;--gold-2:#E4C77B;--line:rgba(201,169,97,.22);
--emerald:#3FA37C;--shadow:0 2px 6px rgba(0,0,0,.25),0 16px 40px rgba(0,0,0,.35);--radius:14px;
--sans:'Pretendard',-apple-system,'Apple SD Gothic Neo',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 700px at 50% -10%,#123024 0%,var(--bg) 55%);color:var(--ink);
font-family:var(--sans);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(11,31,23,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--card-line)}
.topbar-inner{max-width:820px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--ink);text-decoration:none}
.mark{width:26px;height:26px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#0B1F17;font-size:13px;font-weight:800}
.sub{color:var(--ink-3);font-weight:500;font-size:13.5px}
.sub::before{content:'·';margin:0 8px}
#langSel{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--gold);background:var(--surface-2);
border:1.5px solid var(--line);border-radius:99px;padding:7px 12px;cursor:pointer;outline:none}
main{max-width:820px;margin:0 auto;padding:44px clamp(20px,5vw,32px) 80px}
.eyebrow{display:inline-block;background:rgba(201,169,97,.14);color:var(--gold);padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
h1{font-size:clamp(24px,5vw,34px);font-weight:800;letter-spacing:-.02em;margin:14px 0 6px}
.lead{color:var(--ink-3);margin-bottom:26px}
.card{background:var(--surface);border:1px solid var(--card-line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:14px}
.card h2{font-size:16px;font-weight:800;margin-bottom:10px;color:var(--gold-2)}
.card p, .card li{font-size:14px;color:var(--ink-2);margin-bottom:8px}
.card ul{padding-left:20px}
.card b{color:var(--ink)}
.updated{color:var(--ink-3);font-size:12px;margin-top:20px;text-align:center}
.foot{text-align:center;margin-top:24px}
.foot a{color:var(--gold);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/"><span class="mark">A</span>ARBITORIA <span class="sub">Privacy</span></a>
    <select id="langSel" aria-label="Language">
      <option value="ko">한국어</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
  </div>
</header>
<main id="content"></main>
<script>
'use strict';
const PAGES = {
  ko: `
  <span class="eyebrow">PRIVACY · COOKIES</span>
  <h1>개인정보 및 쿠키 정책</h1>
  <p class="lead">가장 짧은 정책 — 우리는 당신이 누구인지 모르고, 알려고 하지 않습니다.</p>
  <div class="card"><h2>1. 운영 주체</h2>
    <p><b>ARBITORIA</b> — 유럽연합(EU), 벨기에를 본거지로 운영됩니다. 본 서비스(arbitoria.com의 Dream Simulation, Dream Index, Family Office 데모)는 EU GDPR 및 ePrivacy 규정을 기준으로 설계되었습니다.</p>
    <p>문의: <b>contact@arbitoria.com</b></p></div>
  <div class="card"><h2>2. 우리가 수집하지 않는 것</h2>
    <ul><li>이름, 이메일, 전화번호 — <b>계정 자체가 없습니다</b></li>
    <li>IP 주소, 기기 식별자 — <b>저장하지 않습니다</b></li>
    <li>추적 쿠키, 광고 쿠키, 분석 도구(GA 등) — <b>사용하지 않습니다</b></li></ul></div>
  <div class="card"><h2>3. 우리가 저장하는 것 (전부 익명)</h2>
    <p>게임을 끝까지 플레이하면 <b>익명의 게임 선택값</b>만 저장됩니다: 나이대, 직업 유형, 수입·저축 구간, 고른 꿈(차·도시·여행), 수익률 성향, 나라, 행복지수, 도달 나이. 이 값들은 누구인지 특정할 수 없으며(GDPR 전문 26조의 익명정보), 오직 집계 형태(<a href="/insights" style="color:var(--gold)">Dream Index</a>)로만 공개됩니다.</p></div>
  <div class="card"><h2>4. 로컬 저장소 (쿠키류)</h2>
    <p>브라우저에 저장되는 것은 딱 두 가지 — 모두 기능성이며, ePrivacy 지침 5(3)조의 동의 예외(서비스 제공에 필요한 저장)에 해당합니다:</p>
    <ul><li><b>dreamLang</b> — 선택한 언어</li><li><b>cookieAck</b> — 이 안내를 닫았다는 표시</li></ul>
    <p>추적 목적의 쿠키는 하나도 없습니다.</p></div>
  <div class="card"><h2>5. 인프라</h2>
    <p>호스팅·데이터베이스: <b>Cloudflare</b> (EU 데이터센터 포함 글로벌 엣지). 환율 표시는 유럽중앙은행(ECB) 공개 시세를 사용합니다.</p></div>
  <div class="card"><h2>6. 당신의 권리</h2>
    <p>GDPR상 열람·정정·삭제권은 개인 식별이 가능한 데이터에 적용됩니다. 우리는 식별 가능한 데이터를 보유하지 않아 특정 개인의 기록을 찾아드릴 수 없지만, 정책에 관한 어떤 질문이든 위 연락처로 문의하실 수 있습니다. 벨기에 데이터보호청(APD/GBA)에 민원을 제기할 권리가 있습니다.</p></div>`,
  en: `
  <span class="eyebrow">PRIVACY · COOKIES</span>
  <h1>Privacy & Cookie Policy</h1>
  <p class="lead">The shortest policy — we don't know who you are, and we don't try to.</p>
  <div class="card"><h2>1. Who we are</h2>
    <p><b>ARBITORIA</b> — operated from Belgium, in the European Union. These services (Dream Simulation, Dream Index and the Family Office demo on arbitoria.com) are designed around the EU GDPR and the ePrivacy Directive.</p>
    <p>Contact: <b>contact@arbitoria.com</b></p></div>
  <div class="card"><h2>2. What we do NOT collect</h2>
    <ul><li>Names, emails, phone numbers — <b>there are no accounts</b></li>
    <li>IP addresses, device identifiers — <b>never stored</b></li>
    <li>Tracking cookies, ad cookies, analytics (GA etc.) — <b>none</b></li></ul></div>
  <div class="card"><h2>3. What we store (all anonymous)</h2>
    <p>If you finish the game, only <b>anonymous gameplay choices</b> are stored: age, career type, income/saving ranges, chosen dream (car · city · journey), return appetite, country, happiness score, arrival age. These cannot identify anyone (anonymous information under GDPR Recital 26) and are published only in aggregate on the <a href="/insights" style="color:var(--gold)">Dream Index</a>.</p></div>
  <div class="card"><h2>4. Local storage (cookie-like)</h2>
    <p>Exactly two items live in your browser — both functional, covered by the consent exemption of Art. 5(3) ePrivacy (strictly necessary for the service you requested):</p>
    <ul><li><b>dreamLang</b> — your chosen language</li><li><b>cookieAck</b> — that you dismissed this notice</li></ul>
    <p>There are zero tracking cookies.</p></div>
  <div class="card"><h2>5. Infrastructure</h2>
    <p>Hosting & database: <b>Cloudflare</b> (global edge incl. EU data centres). Exchange rates shown are public ECB reference rates.</p></div>
  <div class="card"><h2>6. Your rights</h2>
    <p>GDPR rights of access, rectification and erasure apply to identifiable data. As we hold none, we cannot locate any individual's record — but you may contact us with any question about this policy, and you have the right to lodge a complaint with the Belgian Data Protection Authority (APD/GBA).</p></div>`,
  fr: `
  <span class="eyebrow">PRIVACY · COOKIES</span>
  <h1>Politique de confidentialité et cookies</h1>
  <p class="lead">La politique la plus courte — nous ne savons pas qui vous êtes, et nous n'essayons pas de le savoir.</p>
  <div class="card"><h2>1. Qui nous sommes</h2>
    <p><b>ARBITORIA</b> — exploité depuis la Belgique, au sein de l'Union européenne. Ces services (Dream Simulation, Dream Index et la démo Family Office sur arbitoria.com) sont conçus selon le RGPD et la directive ePrivacy.</p>
    <p>Contact : <b>contact@arbitoria.com</b></p></div>
  <div class="card"><h2>2. Ce que nous ne collectons PAS</h2>
    <ul><li>Noms, e-mails, téléphones — <b>il n'y a pas de comptes</b></li>
    <li>Adresses IP, identifiants d'appareil — <b>jamais stockés</b></li>
    <li>Cookies de suivi, publicitaires, analytics — <b>aucun</b></li></ul></div>
  <div class="card"><h2>3. Ce que nous stockons (tout est anonyme)</h2>
    <p>Si vous terminez le jeu, seuls des <b>choix de jeu anonymes</b> sont stockés : âge, type de métier, tranches de revenu/épargne, rêve choisi (voiture · ville · voyage), appétit de rendement, pays, indice de bonheur, âge d'arrivée. Ces valeurs ne peuvent identifier personne (informations anonymes, considérant 26 du RGPD) et ne sont publiées qu'en agrégat sur le <a href="/insights" style="color:var(--gold)">Dream Index</a>.</p></div>
  <div class="card"><h2>4. Stockage local (type cookies)</h2>
    <p>Exactement deux éléments dans votre navigateur — tous deux fonctionnels, couverts par l'exemption de consentement de l'art. 5(3) ePrivacy (strictement nécessaires au service demandé) :</p>
    <ul><li><b>dreamLang</b> — votre langue</li><li><b>cookieAck</b> — la fermeture de cet avis</li></ul>
    <p>Zéro cookie de suivi.</p></div>
  <div class="card"><h2>5. Infrastructure</h2>
    <p>Hébergement & base de données : <b>Cloudflare</b> (edge mondial incl. centres de données UE). Les taux de change affichés sont les taux de référence publics de la BCE.</p></div>
  <div class="card"><h2>6. Vos droits</h2>
    <p>Les droits RGPD d'accès, de rectification et d'effacement s'appliquent aux données identifiables. N'en détenant aucune, nous ne pouvons retrouver le dossier d'un individu — mais vous pouvez nous contacter pour toute question, et vous avez le droit d'introduire une réclamation auprès de l'Autorité belge de protection des données (APD/GBA).</p></div>`,
};
const FOOT = {
  ko: '🌳 게임으로 돌아가기', en: '🌳 Back to the game', fr: '🌳 Retour au jeu',
};
let lang = localStorage.getItem('dreamLang')
  || ({ ko: 'ko', fr: 'fr' }[(navigator.language || 'en').slice(0, 2)] || 'en');
function render() {
  document.documentElement.lang = lang;
  document.getElementById('langSel').value = lang;
  document.getElementById('content').innerHTML = PAGES[lang]
    + `<p class="updated">Last updated · 2026-07</p>`
    + `<p class="foot"><a href="/">${FOOT[lang]}</a></p>`;
}
document.getElementById('langSel').addEventListener('change', (e) => {
  lang = e.target.value;
  try { localStorage.setItem('dreamLang', lang); } catch (_) {}
  render();
});
render();
</script>
</body>
</html>
